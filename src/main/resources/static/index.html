<!DOCTYPE html>
<html>
<head>

    <title>Workers</title>

    <link rel="stylesheet" href="/css/layout.css">

</head>

<body>

<div class="container">

    <h1>Cadastro de Workers</h1>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="predio" placeholder="Prédio">
    <input id="telefone" placeholder="Telefone">

    <br>

    <button onclick="criarWorker()">Salvar</button>
    <button onclick="limpar()">Limpar</button>
    <button onclick="listar()">Mostrar Todos</button>

    <br><br>

    <input id="busca" placeholder="Buscar por nome" onkeyup="buscar()">

    <h2>Lista de Workers</h2>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Prédio</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody id="lista"></tbody>

    </table>

</div>

<script src="/js/api/workerApi.js"></script>
<script src="/js/components/table.js"></script>
<script src="/js/services/workerService.js"></script>

<script>

    listar();

</script>

</body>
</html>
