<!DOCTYPE html>
<html>
<head>

    <title>Workers</title>

    <link rel="stylesheet" href="/css/layout.css">

</head>

<body>

<div class="container">

    <h1>Cadastro de Workers</h1>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input type="text" id="staffNumber" placeholder="Staff Number">
    <select id="position">
        <option value="">Selecione posição</option>
        <option value="cleaner">Cleaner</option>
        <option value="team_leader">Team Leader</option>
    </select>
    <select id="predio">
        <option value="">Selecione o prédio</option>
    </select>
    <input id="telefone" placeholder="Telefone">

    <br>

    <button id="salvarBtn">Salvar</button>
    <button id="limparBtn">Limpar</button>
    <button id="listarBtn">Mostrar Todos</button>

    <br><br>

    <select id="tipoBusca">
        <option value="nome">Search by name</option>
        <option value="predio">Search by Building</option>
    </select>
    <input type="text" id="busca" placeholder="Digite para buscar">

    <h2>Lista de Workers</h2>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Staff Number</th>
            <th>Position</th>
            <th>Prédio</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody id="lista"></tbody>

    </table>

</div>

<script src="/js/components/table.js"></script>
<script src="/js/services/workerService.js"></script>

<script>
    listar()
    carregarPredios();
</script>

</body>
</html>
