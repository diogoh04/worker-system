<!DOCTYPE html>
<html>
<head>
    <title>Workers</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f8;
            padding:40px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        input{
            padding:10px;
            margin:5px;
            width:180px;
        }

        button{
            padding:10px 15px;
            background:#2c7be5;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#1a5fd1;
        }

        .delete{
            background:#e63757;
        }

        .delete:hover{
            background:#c92d4a;
        }

        .edit{
            background:#f6c343;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:left;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Cadastro de Workers</h1>

    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="predio" placeholder="Prédio">
    <input id="telefone" placeholder="Telefone">

    <br>

    <button onclick="criarWorker()">Salvar</button>
    <button onclick="limpar()">Limpar</button>

    <br><br>

    <input id="busca" placeholder="Buscar por nome" onkeyup="buscar()">

    <h2>Lista de Workers</h2>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Prédio</th>
            <th>Telefone</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody id="lista"></tbody>

    </table>

</div>

<script>

    let workers = [];
    let editId = null;

    async function listar(){

        const resposta = await fetch("/worker");
        workers = await resposta.json();

        render(workers);

    }

    function render(listaWorkers){

        const lista = document.getElementById("lista");
        lista.innerHTML="";

        listaWorkers.forEach(w => {

            lista.innerHTML += `
<tr>
<td>${w.id}</td>
<td>${w.nome}</td>
<td>${w.email}</td>
<td>${w.predio}</td>
<td>${w.telefone}</td>

<td>

<button class="edit" onclick="editar(${w.id})">Editar</button>

<button class="delete" onclick="deletar(${w.id})">Excluir</button>

</td>

</tr>
`;

        });

    }

    async function criarWorker(){

        const worker={
            nome:document.getElementById("nome").value,
            email:document.getElementById("email").value,
            predio:document.getElementById("predio").value,
            telefone:document.getElementById("telefone").value
        };

        if(editId==null){

            await fetch("/worker",{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(worker)
            });

        }else{

            await fetch("/worker/"+editId,{
                method:"PUT",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify(worker)
            });

            editId=null;

        }

        limpar();

        listar();

    }

    async function deletar(id){

        await fetch("/worker/"+id,{
            method:"DELETE"
        });

        listar();

    }

    function editar(id){

        const worker = workers.find(w=>w.id===id);

        document.getElementById("nome").value=worker.nome;
        document.getElementById("email").value=worker.email;
        document.getElementById("predio").value=worker.predio;
        document.getElementById("telefone").value=worker.telefone;

        editId=id;

    }

    function limpar(){

        document.getElementById("nome").value="";
        document.getElementById("email").value="";
        document.getElementById("predio").value="";
        document.getElementById("telefone").value="";

        editId=null;

    }

    function buscar(){

        const texto = document.getElementById("busca").value.toLowerCase();

        const filtrado = workers.filter(w =>
            w.nome.toLowerCase().includes(texto)
        );

        render(filtrado);

    }

    document.addEventListener("keydown",function(e){

        if(e.key==="Enter"){

            criarWorker();

        }

    });

    listar();

</script>

</body>
</html>
